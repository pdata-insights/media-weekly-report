function squarify(items,x,y,w,h){if(!items.length)return[];
const results=[];let remaining=[...items];
while(remaining.length){const isWide=w>=h;let row=[],rowSum=0,bestRatio=Infinity;
for(let i=0;i<remaining.length;i++){row.push(remaining[i]);rowSum+=remaining[i].area;
const maxA=Math.max(...row.map(r=>r.area)),minA=Math.min(...row.map(r=>r.area));
const s=isWide?h:w;const ratio=Math.max(s*s*maxA/(rowSum*rowSum),rowSum*rowSum/(s*s*minA));
if(ratio>bestRatio&&row.length>1){row.pop();rowSum-=remaining[i].area;break;}bestRatio=ratio;}
const rowLen=isWide?rowSum/h:rowSum/w;let pos=isWide?y:x;
row.forEach(item=>{const iL=item.area/rowLen;let rect;
if(isWide){rect={x,y:pos,w:rowLen,h:iL};pos+=iL;}
else{rect={x:pos,y,w:iL,h:rowLen};pos+=iL;}results.push({...item,rect});});

if(isWide){x+=rowLen;w-=rowLen;}else{y+=rowLen;h-=rowLen;}}return results;}
